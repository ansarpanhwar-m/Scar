<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ansar TikTok Video Downloader</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Consolas, monospace;
}

body{
  overflow:hidden;
  background:#000814;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#00aeff;
}

/* MATRIX BACKGROUND */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* GLOW EFFECT */

.glow{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#008cff55 0%,transparent 70%);
  filter:blur(60px);
  animation:moveGlow 8s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveGlow{
  0%{
    transform:translate(-150px,-100px);
  }

  100%{
    transform:translate(150px,100px);
  }
}

/* MAIN BOX */

.container{
  width:90%;
  max-width:430px;
  background:rgba(0,10,25,0.75);
  border:1px solid #00aaff;
  border-radius:22px;
  padding:28px;
  text-align:center;
  backdrop-filter:blur(8px);
  box-shadow:
  0 0 20px #008cff,
  0 0 60px #0066ff55;
}

/* TITLE */

h1{
  color:#00bfff;
  font-size:28px;
  margin-bottom:20px;
  text-shadow:
  0 0 10px #00aaff,
  0 0 30px #006eff;
}

/* INPUT */

input{
  width:100%;
  padding:15px;
  background:#00111f;
  border:1px solid #00aaff;
  border-radius:12px;
  color:#00d5ff;
  font-size:15px;
  outline:none;
  margin-bottom:15px;
  box-shadow:0 0 10px #008cff33 inset;
}

input::placeholder{
  color:#66d9ff;
}

/* BUTTON */

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#009dff,#0044ff);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:
  0 0 15px #008cff,
  0 0 40px #0044ff55;
}

button:hover{
  transform:scale(1.03);
  box-shadow:
  0 0 25px #00bfff,
  0 0 50px #0055ff;
}

/* RESULT */

#result{
  margin-top:20px;
}

/* VIDEO */

video{
  width:100%;
  margin-top:15px;
  border-radius:15px;
  border:1px solid #00aaff;
  box-shadow:
  0 0 20px #008cff;
}

/* DOWNLOAD BUTTON */

.download-btn{
  margin-top:15px;
  display:inline-block;
  padding:13px 22px;
  border-radius:12px;
  background:linear-gradient(45deg,#00aaff,#0044ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:
  0 0 15px #008cff,
  0 0 40px #0044ff55;
}

.download-btn:hover{
  transform:scale(1.05);
}

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="glow"></div>

<div class="container">

<h1>ANSAR TIKTOK VIDEO DOWNLOADER</h1>

<input
type="text"
id="url"
placeholder="Paste TikTok Video Link"
/>

<button onclick="downloadTikTok()">
DOWNLOAD VIDEO
</button>

<div id="result"></div>

</div>

<script>

/* DOWNLOAD FUNCTION */

async function downloadTikTok(){

  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if(url === ""){

    result.innerHTML = "ENTER TIKTOK VIDEO URL";
    return;

  }

  result.innerHTML = "PROCESSING...";

  try{

    const api =
    `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;

    const response = await fetch(api);
    const data = await response.json();

    if(data && data.data && data.data.play){

      result.innerHTML = `

      <video controls>
        <source src="${data.data.play}" type="video/mp4">
      </video>

      <br>

      <div
      class="download-btn"
      onclick="autoDownload('${data.data.play}')">

      DOWNLOAD NOW

      </div>

      `;

    }else{

      result.innerHTML = "VIDEO NOT FOUND";

    }

  }catch(error){

    result.innerHTML = "DOWNLOAD ERROR";

  }

}


/* AUTO DOWNLOAD */

function autoDownload(videoUrl){

  fetch(videoUrl)

  .then(response => response.blob())

  .then(blob => {

    const blobUrl =
    window.URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = blobUrl;

    a.download =
    "Ansar_TikTok_Video.mp4";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    window.URL.revokeObjectURL(blobUrl);

  })

  .catch(() => {

    alert("DOWNLOAD FAILED");

  });

}



/* ULTRA MATRIX EFFECT */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const chars =
"アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 16;

const columns =
Math.floor(canvas.width / fontSize);

const drops = [];

const colors = [
"#00bfff",
"#00aaff",
"#66ccff",
"#008cff",
"#4dc3ff"
];

for(let i = 0; i < columns; i++){

  drops[i] =
  Math.random() * canvas.height;

}

function draw(){

  ctx.fillStyle =
  "rgba(0, 0, 20, 0.08)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.font =
  fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text =
    chars.charAt(
      Math.floor(
        Math.random() * chars.length
      )
    );

    const x =
    i * fontSize;

    const y =
    drops[i] * fontSize;

    ctx.fillStyle =
    colors[
      Math.floor(
        Math.random() * colors.length
      )
    ];

    ctx.shadowColor =
    "#00aaff";

    ctx.shadowBlur = 15;

    ctx.fillText(text, x, y);

    // WHITE HEAD EFFECT
    ctx.fillStyle = "#ffffff";

    ctx.fillText(text, x, y - 18);

    if(
      y > canvas.height &&
      Math.random() > 0.975
    ){

      drops[i] = 0;

    }

    drops[i]++;

  }

}

setInterval(draw, 33);


/* RESPONSIVE */

window.addEventListener("resize", () => {

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

});

</script>

</body>
</html>

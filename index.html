<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ansar TikTok Video Downloader</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Consolas, monospace;
    }

    body{
      background:#000;
      overflow:hidden;
      color:#00ff99;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-1;
    }

    .container{
      width:90%;
      max-width:420px;
      background:rgba(0,0,0,0.75);
      border:1px solid #00ff99;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 0 25px #00ff99;
      backdrop-filter:blur(6px);
    }

    h1{
      margin-bottom:20px;
      color:#00ff99;
      font-size:26px;
      text-shadow:0 0 10px #00ff99;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:10px;
      margin-bottom:15px;
      background:#111;
      color:#00ff99;
      border:1px solid #00ff99;
      font-size:15px;
    }

    input::placeholder{
      color:#00cc77;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#00ff99;
      color:#000;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#00cc77;
      box-shadow:0 0 15px #00ff99;
    }

    #result{
      margin-top:20px;
    }

    video{
      margin-top:15px;
      border-radius:12px;
      border:1px solid #00ff99;
      box-shadow:0 0 15px #00ff99;
    }

    .download-btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 20px;
      background:#00ff99;
      color:#000;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 0 15px #00ff99;
    }

  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

  <h1>ANSAR TIKTOK VIDEO DOWNLOADER</h1>

  <input type="text" id="url" placeholder="Paste TikTok Video Link">

  <button onclick="downloadTikTok()">DOWNLOAD VIDEO</button>

  <div id="result"></div>

</div>

<script>

async function downloadTikTok() {

  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  if(url === ""){
    result.innerHTML = "ENTER TIKTOK URL";
    return;
  }

  result.innerHTML = "PROCESSING...";

  try {

    const api = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;

    const response = await fetch(api);
    const data = await response.json();

    if(data && data.data && data.data.play){

      result.innerHTML = `
        <video width="100%" controls>
          <source src="${data.data.play}" type="video/mp4">
        </video>

        <br>

        <div class="download-btn" onclick="autoDownload('${data.data.play}')">
          DOWNLOAD NOW
        </div>
      `;

    } else {

      result.innerHTML = "VIDEO NOT FOUND";

    }

  } catch(err){

    result.innerHTML = "ERROR DOWNLOADING VIDEO";

  }

}


function autoDownload(videoUrl){

  fetch(videoUrl)
    .then(response => response.blob())
    .then(blob => {

      const blobUrl = window.URL.createObjectURL(blob);

      const a = document.createElement("a");

      a.href = blobUrl;
      a.download = "Ansar_TikTok_Video.mp4";

      document.body.appendChild(a);

      a.click();

      document.body.removeChild(a);

      window.URL.revokeObjectURL(blobUrl);

    })
    .catch(() => {

      alert("DOWNLOAD FAILED");

    });

}



/* MATRIX HACKING EFFECT */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++){
  drops[x] = 1;
}

function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff99";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = letters.charAt(Math.floor(Math.random() * letters.length));

    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;

  }

}

setInterval(draw, 35);

</script>

</body>
</html>
